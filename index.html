<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>最強仕事術ダッシュボード</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d1117;color:#c9d1d9;padding:20px;max-width:900px;margin:0 auto}
h1{text-align:center;color:#58a6ff;margin-bottom:8px;font-size:1.6em}
.meta{text-align:center;color:#8b949e;margin-bottom:12px;font-size:.9em}
.meta span{margin:0 6px}
.actions{text-align:center;margin-bottom:16px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.act-btn{background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:.9em}
.act-btn:hover{background:#21262d}
.act-btn.primary{border-color:#1f6feb;color:#58a6ff}
.act-btn.warn{border-color:#d29922;color:#e3b341}
.section{background:#161b22;border:1px solid #30363d;border-radius:8px;margin-bottom:14px;overflow:hidden}
.section-header{padding:12px 16px;font-weight:bold;font-size:1.05em;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.section-header:hover{opacity:.85}
.section-body{padding:0 16px 12px}
.section-body.collapsed{display:none}
.task{padding:8px 0;border-bottom:1px solid #21262d;display:flex;flex-direction:column;gap:0;position:relative}
.task:last-child{border-bottom:none}
.task:hover{background:#1c2128;margin:0 -16px;padding:8px 16px}
.task.done .task-name{text-decoration:line-through;color:#484f58}
.task.done .task-meta{color:#484f58}
.task-check{width:18px;height:18px;border:2px solid #30363d;border-radius:4px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer}
.task.done .task-check{background:#238636;border-color:#238636;color:#fff}
.task-check::after{content:'\2713';font-size:12px;display:none}
.task.done .task-check::after{display:block}
.task-content{flex:1;min-width:0;cursor:pointer}
.task-name{display:block;line-height:1.4;word-break:break-word}
.task-meta{color:#8b949e;font-size:.85em;white-space:nowrap;flex-shrink:0;margin-top:2px}
.priority-tag{font-size:.72em;padding:2px 6px;border-radius:4px;margin-left:6px;display:inline-block}
.p-top{background:#da3633;color:#fff}
.p-high{background:#d29922;color:#fff}
.p-success{background:#238636;color:#fff}
.p-info{background:#1f6feb;color:#fff}
.p-neutral{background:#30363d;color:#c9d1d9}
.memo{color:#8b949e;font-size:.8em;display:block;margin-top:3px}
.submeta{color:#6e7681;font-size:.75em;display:block;margin-top:3px}
.badge{font-size:.85em;padding:2px 8px;border-radius:12px;color:#fff;background:#30363d}
.stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.stat-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px 16px;text-align:center;min-width:80px}
.stat-num{font-size:1.6em;font-weight:bold;color:#58a6ff}
.stat-label{font-size:.75em;color:#8b949e}
.done-count{font-size:.8em;color:#3fb950;margin-left:8px}
.s-cyan .section-header{background:#39c5cf22;color:#39c5cf}
.s-magenta .section-header{background:#db61a222;color:#db61a2}
.s-red .section-header{background:#da363322;color:#f85149}
.s-orange .section-header{background:#d2992222;color:#d29922}
.s-yellow .section-header{background:#e3b34122;color:#e3b341}
.s-green .section-header{background:#23883422;color:#3fb950}
.s-blue .section-header{background:#1f6feb22;color:#58a6ff}
.s-white .section-header{background:#8b949e22;color:#8b949e}
.s-shop .section-header{background:#a371f722;color:#a371f7}
.s-gold .section-header{background:#d2992244;color:#d29922}
.s-gray .section-header{background:#48505822;color:#6e7681}
.progress-bar{height:3px;background:#21262d;overflow:hidden}
.progress-fill{height:100%;background:#238636;transition:width .3s}
.footer{text-align:center;margin-top:16px;font-size:.85em;color:#484f58}
.footer a{color:#58a6ff;text-decoration:none}
.task.moving{animation:moveOut .28s ease-out forwards;pointer-events:none}
@keyframes moveOut{0%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(60px)}}
.hint-bar{text-align:center;font-size:.78em;color:#484f58;margin-bottom:12px}
.hint-bar span{margin:0 8px}
.move-btn{background:none;border:none;color:#6e7681;cursor:pointer;padding:2px 6px;font-size:1.1em;border-radius:4px;flex-shrink:0}
.move-btn:hover{background:#30363d;color:#c9d1d9}
.move-menu{position:absolute;right:0;top:24px;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:6px;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.4);min-width:220px}
.move-menu.hidden{display:none}
.move-menu-title{font-size:.72em;color:#6e7681;padding:4px 8px;border-bottom:1px solid #21262d;margin-bottom:4px}
.move-menu-item{padding:6px 10px;font-size:.85em;cursor:pointer;color:#c9d1d9;border-radius:4px}
.move-menu-item:hover{background:#1f6feb33;color:#58a6ff}
.move-menu-item.current{color:#484f58;pointer-events:none}
.loading{text-align:center;padding:40px 20px;color:#8b949e}
.loading-spinner{display:inline-block;width:32px;height:32px;border:3px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:#da363322;border:1px solid #f85149;color:#f85149;padding:14px;border-radius:8px;margin-bottom:16px;font-size:.9em;text-align:center}
.err-box code{background:#0d1117;padding:2px 6px;border-radius:3px;font-size:.85em}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:10px 18px;border-radius:6px;font-size:.9em;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.5);opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.toast.err,.toast.error{border-color:#f85149;color:#f85149}
.toast.ok{border-color:#3fb950;color:#3fb950}
.toast.warn{border-color:#d29922;color:#e3b341}

/* ===== Phase C: 各行に横並び 9 ボタン + sweeper + syncIndicator ===== */
.jump-nav{
  position:sticky;top:0;z-index:100;
  background:rgba(13,17,23,0.95);backdrop-filter:blur(8px);
  padding:8px 4px;margin:0 -8px 12px -8px;
  display:flex;flex-wrap:wrap;gap:4px;justify-content:center;
  border-bottom:1px solid #21262d;
}
.jump-btn{
  padding:5px 10px;border-radius:14px;
  border:1px solid #30363d;background:#161b22;color:#c9d1d9;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .15s;user-select:none;white-space:nowrap;
  display:inline-flex;align-items:center;gap:4px;
}
.jump-btn:hover{background:#21262d;border-color:#58a6ff;color:#58a6ff}
.jump-btn:active{transform:scale(0.92)}
.jump-btn .jn-count{
  font-size:11px;padding:1px 6px;border-radius:8px;
  background:#30363d;color:#c9d1d9;font-weight:700;
}
.jump-btn:hover .jn-count{background:#1f6feb;color:#fff}
.task-row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;width:100%}
.quick-buttons{
  display:flex;gap:4px;margin-top:6px;padding-left:30px;
  flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;
}
.quick-buttons::-webkit-scrollbar{display:none}
.quick-btn{
  min-width:32px;min-height:32px;padding:0 6px;
  border-radius:50%;border:1px solid #30363d;
  background:transparent;color:#c9d1d9;
  font-size:14px;font-weight:600;cursor:pointer;
  transition:all .15s;user-select:none;
  display:inline-flex;align-items:center;justify-content:center;
  flex-shrink:0;line-height:1;
}
.quick-btn:hover{background:#21262d;border-color:#58a6ff}
.quick-btn:active{transform:scale(0.85)}
.quick-btn.moving{opacity:0.4}
.quick-btn.disabled{opacity:0.3;pointer-events:none;background:#0d1117}
@media (max-width:400px){
  .quick-btn{min-width:30px;min-height:30px;padding:0 4px;font-size:13px}
  .quick-buttons{padding-left:24px;gap:3px}
}
#syncIndicator{
  position:fixed;top:12px;right:12px;
  padding:6px 12px;border-radius:12px;
  background:#d29922;color:#fff;font-size:12px;font-weight:600;
  opacity:0;transition:all .3s;z-index:9998;
  pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.4);
}
#syncIndicator.show{opacity:1}
.task.moving-fade{opacity:0.3;transition:opacity .3s}
</style>
</head>
<body>
<h1>💪 最強仕事術ダッシュボード</h1>
<div class="meta">
  <span>最終同期: <span id="lastSync">-</span></span>｜
  <span>DB: Notion v2（<span id="dbTotal">-</span>件）</span>
</div>
<div class="actions">
  <button class="act-btn primary" onclick="reloadTasks()">🔄 再同期</button>
  <button class="act-btn warn" onclick="weeklyFlush()">📮 週初め全リセット（Inbox → 思いついたすべてのこと）</button>
</div>
<div class="hint-bar">
  <span>チェック = 完了マーク（ローカル）</span>｜
  <span>タイトルダブルクリック → 🏆 サクセス</span>｜
  <span>⋮ボタン → 他のカラムへ移動</span>
</div>
<div class="stats" id="stats"></div>
<div id="jumpNav" class="jump-nav"></div>
<div id="app"><div class="loading"><div class="loading-spinner"></div><div>Notion DB v2 から取得中…</div></div></div>
<div class="footer">
  <a href="https://github.com/mits32163216/saikyou-dashboard" target="_blank">GitHub</a>｜
  Workers proxy: <a href="https://saikyou-dashboard-proxy.3216-fun.workers.dev/health" target="_blank">/health</a>
</div>
<div id="toast" class="toast"></div>
<div id="syncIndicator"></div>

<script>
// ============================================================================
// 定数
// ============================================================================
const PROXY = 'https://saikyou-dashboard-proxy.3216-fun.workers.dev';
const DONE_KEY = 'dashboard_done_v12';

// 12箱モデル・11 sections（表示順・buy が独立箱として復活）
const SECTIONS = [
  {key:'inbox',       label:'📥 Inbox（新規流入・毎日溜まる）',                 cls:'s-cyan',    jikanjiku:'Inbox',                 showQuickButtons:true, meta:['投入元','起算日']},
  {key:'omoi_tsuita', label:'📮 思いついたすべてのこと（週初め仕分け入口）',       cls:'s-magenta', jikanjiku:'未仕訳',                showQuickButtons:true, meta:['種別','memo_date','project']},
  {key:'today',       label:'🔴 今日やること',                                cls:'s-red',     jikanjiku:'今日やること',          showQuickButtons:true, currentAxis:'今日やること',          meta:['種別','memo','min','priority']},
  {key:'tomorrow',    label:'🟠 明日でもいいこと',                             cls:'s-orange',  jikanjiku:'明日やること',          showQuickButtons:true, currentAxis:'明日やること',          meta:['種別','memo','min','priority']},
  {key:'h48',         label:'🟡 48時間以上先',                                cls:'s-yellow',  jikanjiku:'48h以上先にやること',   showQuickButtons:true, currentAxis:'48h以上先にやること',   meta:['種別','memo','min']},
  {key:'w1',          label:'🟢 1週間以上先',                                 cls:'s-green',   jikanjiku:'1週間以上先にやること', showQuickButtons:true, currentAxis:'1週間以上先にやること', meta:['種別','memo']},
  {key:'w2plus',      label:'🔵 2週間以上先',                                 cls:'s-blue',    jikanjiku:'2週間以上先にやること', showQuickButtons:true, currentAxis:'2週間以上先にやること', meta:['種別','memo']},
  {key:'w1month',     label:'⚪ 1ヶ月以上先',                                  cls:'s-white',   jikanjiku:'1ヶ月以上先にやること', showQuickButtons:true, currentAxis:'1ヶ月以上先にやること', meta:['種別','memo']},
  {key:'idea',        label:'💡 アイデア',                                    cls:'s-purple',  jikanjiku:'💡 アイデア',           showQuickButtons:true, currentAxis:'💡 アイデア',           meta:['種別','memo']},
  {key:'buy',         label:'🛒 買い物',                                     cls:'s-shop',    jikanjiku:'🛒 買い物',             showQuickButtons:true, currentAxis:'🛒 買い物',             meta:[]},
  {key:'success',     label:'🏆 サクセスファイル',                             cls:'s-gold',    jikanjiku:'サクセス',              showQuickButtons:true, currentAxis:'サクセス',              meta:['種別']},
  {key:'keshizumi',   label:'🗑 消し炭（廃棄済保管）',                         cls:'s-gray',    jikanjiku:'消し炭',                showQuickButtons:true, currentAxis:'消し炭',                meta:['種別','memo_date']},
  {key:'delete',      label:'❌ 削除',                                       cls:'s-red',     jikanjiku:'❌ 削除',              showQuickButtons:true, currentAxis:'❌ 削除',               meta:['種別']}
];

// Phase C: 横並び 11 ボタンの仕訳先（Inbox / 未仕訳 は除外）
const QUICK_TARGETS = [
  ['今日やること',         '1'],
  ['明日やること',         '2'],
  ['48h以上先にやること',  '48'],
  ['1週間以上先にやること', '7d'],
  ['2週間以上先にやること', '14d'],
  ['1ヶ月以上先にやること', '30d'],
  ['💡 アイデア',          '💡'],
  ['🛒 買い物',           '🛒'],
  ['サクセス',             '🎉'],
  ['消し炭',               '🗑'],
  ['❌ 削除',              '❌']
];

// Phase C: sweeper 設定
const QUEUE_KEY = 'saikyou_pending_queue_v1';
const RETRY_INTERVAL_MS = 30000;   // 30秒
const MAX_RETRY = 5;

// 移動先ドロップダウンの選択肢
const MOVE_TARGETS = SECTIONS.map(s => ({key: s.key, label: s.label, jikanjiku: s.jikanjiku}));

// ============================================================================
// state
// ============================================================================
let state = {
  buckets: {},
  stats: {total:0, done:0, undone:0},
  last_updated: null,
  loading: true,
  error: null
};
let doneState = {};
try { doneState = JSON.parse(localStorage.getItem(DONE_KEY) || '{}'); } catch(e) {}
let collapsed = {};

// ============================================================================
// utility
// ============================================================================
function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function saveDone() {
  try { localStorage.setItem(DONE_KEY, JSON.stringify(doneState)); } catch(e) {}
}
function toast(msg, kind) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (kind ? ' ' + kind : '');
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.className = 'toast'; }, 2400);
}
function fmtTime(iso) {
  if (!iso) return '-';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
  } catch(e) { return '-'; }
}

// ============================================================================
// API
// ============================================================================
async function fetchTasks() {
  state.loading = true;
  state.error = null;
  render();
  try {
    const res = await fetch(PROXY + '/tasks', {method:'GET'});
    const data = await res.json();
    if (!res.ok) {
      state.error = data.error || ('HTTP ' + res.status);
      if (data.error === 'notion_token_not_configured') {
        state.error = 'NOTION_TOKEN 未投入（Mits手動投入待ち・secrets_status.notion_token=false）';
      }
      state.loading = false;
      render();
      return;
    }
    state.buckets = data.buckets || {};
    state.stats = data.stats || {total:0, done:0, undone:0};
    state.last_updated = data.last_updated;
    state.loading = false;
    render();
  } catch(e) {
    state.error = 'fetch失敗: ' + e.message;
    state.loading = false;
    render();
  }
}

async function updateJikanjiku(pageId, jikanjiku) {
  try {
    const res = await fetch(PROXY + '/update', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({page_id: pageId, '時間軸': jikanjiku})
    });
    const data = await res.json();
    if (!res.ok) return {ok:false, error: data.error || ('HTTP ' + res.status)};
    return {ok:true};
  } catch(e) {
    return {ok:false, error: e.message};
  }
}

async function weeklyFlush() {
  if (!confirm('Inbox 全件を 📮 思いついたすべてのこと に移します。\n（週初め仕分けの入口）よろしいですか？')) return;
  toast('Inbox → 思いついたすべてのこと 移行中…');
  try {
    const res = await fetch(PROXY + '/weekly-flush', {method:'POST'});
    const data = await res.json();
    if (!res.ok) {
      toast('失敗: ' + (data.error || res.status), 'err');
      return;
    }
    toast(data.flushed + '件 移行完了', 'ok');
    fetchTasks();
  } catch(e) {
    toast('通信失敗: ' + e.message, 'err');
  }
}

async function reloadTasks() {
  toast('再同期中…');
  await fetchTasks();
}

// ============================================================================
// 移動処理
// ============================================================================
async function moveTask(fromKey, taskIdx, toJikanjiku) {
  const item = state.buckets[fromKey] && state.buckets[fromKey][taskIdx];
  if (!item) return;
  // 楽観的 UI
  const removed = state.buckets[fromKey].splice(taskIdx, 1)[0];
  const targetKey = (SECTIONS.find(s => s.jikanjiku === toJikanjiku) || {}).key;
  if (targetKey && state.buckets[targetKey]) state.buckets[targetKey].unshift(removed);
  render();

  const r = await updateJikanjiku(item.page_id, toJikanjiku);
  if (!r.ok) {
    // ロールバック
    if (targetKey && state.buckets[targetKey]) {
      const rollbackIdx = state.buckets[targetKey].findIndex(x => x.page_id === item.page_id);
      if (rollbackIdx !== -1) state.buckets[targetKey].splice(rollbackIdx, 1);
    }
    state.buckets[fromKey].splice(taskIdx, 0, removed);
    toast('移動失敗: ' + r.error + '（元に戻しました）', 'err');
    render();
    return;
  }
  toast('→ ' + toJikanjiku, 'ok');
}

// ============================================================================
// Phase C: 楽観的 UI + 自動 sweeper（タップ時 fetch なし・sweeper がまとめて送る）
// ============================================================================
function loadQueue() {
  try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveQueue(q) {
  try { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); } catch(e) {}
  updateSyncIndicator(q.length);
}
function updateSyncIndicator(count) {
  const el = document.getElementById('syncIndicator');
  if (!el) return;
  if (count > 0) {
    el.textContent = '⏳ 同期予定 ' + count + '件';
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}
function showToast(msg, kind) { toast(msg, kind); }

function recomputeStats() {
  document.getElementById('dbTotal').textContent = state.stats.total;
  const todayCount = (state.buckets.today || []).length;
  const todayDone = (state.buckets.today || []).filter(t => doneState[t.page_id]).length;
  const inboxCount = (state.buckets.inbox || []).length;
  const omoiCount = (state.buckets.omoi_tsuita || []).length;
  document.getElementById('stats').innerHTML =
    '<div class="stat-card"><div class="stat-num">' + state.stats.undone + '</div><div class="stat-label">未完了</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + todayCount + '</div><div class="stat-label">今日</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + todayDone + '/' + todayCount + '</div><div class="stat-label">今日の完了</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + inboxCount + '</div><div class="stat-label">📥Inbox</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + omoiCount + '</div><div class="stat-label">📮思いつき</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + ((state.buckets.success || []).length) + '</div><div class="stat-label">🏆サクセス</div></div>';
  // 各 section の badge も更新
  document.querySelectorAll('.section').forEach(sec => {
    const badge = sec.querySelector('.section-header .badge');
    const count = sec.querySelectorAll('.task').length;
    if (badge && badge.textContent !== '-') badge.textContent = count;
  });
}

// Phase C: タップ時は queue push + 楽観的 UI のみ・fetch は呼ばない
async function moveToTimeAxis(pageId, targetAxis, currentSectionKey, taskEl) {
  // 1. 楽観的 UI：0.3秒 fadeout → DOM 削除
  taskEl.classList.add('moving-fade');
  // 2. queue に追加
  const q = loadQueue();
  const entry = {
    page_id: pageId,
    '時間軸': targetAxis,
    timestamp: Date.now() + Math.random(),  // unique key
    retryCount: 0
  };
  q.push(entry);
  saveQueue(q);
  // 3. state からも該当 item を削除（stats 更新のため）
  if (currentSectionKey && state.buckets[currentSectionKey]) {
    const idx = state.buckets[currentSectionKey].findIndex(x => x.page_id === pageId);
    if (idx !== -1) {
      const removed = state.buckets[currentSectionKey].splice(idx, 1)[0];
      const targetSec = SECTIONS.find(s => s.jikanjiku === targetAxis);
      if (targetSec && state.buckets[targetSec.key]) {
        state.buckets[targetSec.key].unshift(removed);
      }
      // stats を undone/done 数だけ recalc（total は変わらない）
    }
  }
  // 4. 0.3秒後に DOM 削除 + stats 再計算 + toast
  setTimeout(() => {
    taskEl.remove();
    recomputeStats();
    showToast('✅ 「' + targetAxis + '」へ移動（同期予定）', 'ok');
  }, 300);
}

// Phase C: Workers /update に 1件 push
async function tryPushEntry(entry) {
  try {
    const res = await fetch(PROXY + '/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ page_id: entry.page_id, '時間軸': entry['時間軸'] })
    });
    const j = await res.json().catch(() => ({}));
    return res.ok && !j.error;
  } catch(e) {
    return false;
  }
}

// Phase C: sweeper - queue 全件を sequential に送信
let sweeperRunning = false;
async function retryQueue() {
  if (sweeperRunning) return;
  sweeperRunning = true;
  try {
    const q = loadQueue();
    if (!q.length) return;
    for (const entry of [...q]) {
      if (entry.retryCount >= MAX_RETRY) continue;
      const ok = await tryPushEntry(entry);
      if (ok) {
        const q2 = loadQueue().filter(e => e.timestamp !== entry.timestamp);
        saveQueue(q2);
      } else {
        // 現状の queue を再ロードして retryCount++
        const cur = loadQueue();
        const target = cur.find(e => e.timestamp === entry.timestamp);
        if (target) {
          target.retryCount = (target.retryCount || 0) + 1;
          saveQueue(cur);
          if (target.retryCount >= MAX_RETRY) {
            showToast('⚠️ 送信失敗（5回試行）: ' + entry.page_id.slice(0, 8), 'err');
          }
        }
      }
    }
  } finally {
    sweeperRunning = false;
  }
}

function closeAllMenus() {
  document.querySelectorAll('.move-menu').forEach(m => m.classList.add('hidden'));
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('.move-btn') && !e.target.closest('.move-menu')) {
    closeAllMenus();
  }
});

// ============================================================================
// render
// ============================================================================
function render() {
  const app = document.getElementById('app');
  if (state.loading) {
    app.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div>Notion DB v2 から取得中…</div></div>';
    return;
  }
  if (state.error) {
    app.innerHTML = '<div class="err-box">⚠️ 取得失敗: <code>' + esc(state.error) + '</code><br><span style="color:#c9d1d9;font-size:.85em">Workers proxy 疎通が取れているか <a href="' + PROXY + '/health" target="_blank" style="color:#58a6ff">/health</a> を確認してください。</span></div>';
    document.getElementById('lastSync').textContent = '-';
    document.getElementById('dbTotal').textContent = '-';
    document.getElementById('stats').innerHTML = '';
    // それでも枠だけは表示する（骨格プレビュー）
    SECTIONS.forEach(sec => {
      const secEl = document.createElement('div');
      secEl.className = 'section ' + sec.cls;
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.innerHTML = '<span>' + sec.label + '</span><span class="badge">-</span>';
      const body = document.createElement('div');
      body.className = 'section-body';
      body.innerHTML = '<div style="color:#484f58;font-size:.85em;padding:12px 0;text-align:center">（Notion同期待ち）</div>';
      secEl.appendChild(hdr);
      secEl.appendChild(body);
      app.appendChild(secEl);
    });
    return;
  }

  document.getElementById('lastSync').textContent = fmtTime(state.last_updated);
  document.getElementById('dbTotal').textContent = state.stats.total;

  const todayCount = (state.buckets.today || []).length;
  const todayDone = (state.buckets.today || []).filter(t => doneState[t.page_id]).length;
  const inboxCount = (state.buckets.inbox || []).length;
  const omoiCount = (state.buckets.omoi_tsuita || []).length;
  document.getElementById('stats').innerHTML =
    '<div class="stat-card"><div class="stat-num">' + state.stats.undone + '</div><div class="stat-label">未完了</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + todayCount + '</div><div class="stat-label">今日</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + todayDone + '/' + todayCount + '</div><div class="stat-label">今日の完了</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + inboxCount + '</div><div class="stat-label">📥Inbox</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + omoiCount + '</div><div class="stat-label">📮思いつき</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + ((state.buckets.success || []).length) + '</div><div class="stat-label">🏆サクセス</div></div>';

  app.innerHTML = '';
  renderJumpNav(state.buckets);
  SECTIONS.forEach(sec => {
    const items = state.buckets[sec.key] || [];
    const secEl = document.createElement('div');
    secEl.className = 'section ' + sec.cls;
    secEl.id = 'sec-' + sec.key;

    const doneCnt = items.filter(t => doneState[t.page_id]).length;
    const doneLabel = doneCnt > 0 ? '<span class="done-count">' + doneCnt + '/' + items.length + '完了</span>' : '';

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = '<span>' + sec.label + doneLabel + '</span><span class="badge">' + items.length + '</span>';

    const prog = document.createElement('div');
    prog.className = 'progress-bar';
    if (items.length > 0) {
      const pct = Math.round(doneCnt / items.length * 100);
      prog.innerHTML = '<div class="progress-fill" style="width:' + pct + '%"></div>';
    }

    const body = document.createElement('div');
    body.className = 'section-body' + (collapsed[sec.key] ? ' collapsed' : '');

    if (items.length === 0) {
      body.innerHTML = '<div style="color:#484f58;font-size:.85em;padding:12px 0;text-align:center">（該当タスクなし）</div>';
    } else {
      items.forEach((item, idx) => {
        body.appendChild(renderTask(sec, item, idx));
      });
    }

    secEl.appendChild(hdr);
    secEl.appendChild(prog);
    secEl.appendChild(body);
    app.appendChild(secEl);

    hdr.addEventListener('click', () => {
      collapsed[sec.key] = !collapsed[sec.key];
      body.classList.toggle('collapsed');
    });
  });
}

function renderJumpNav(buckets) {
  const nav = document.getElementById('jumpNav');
  if (!nav) return;
  nav.innerHTML = '';
  SECTIONS.forEach(s => {
    const count = ((buckets && buckets[s.key]) || []).length;
    const btn = document.createElement('button');
    btn.className = 'jump-btn';
    // label の先頭アイコン部分を抽出（絵文字1つ）
    const iconMatch = s.label.match(/^(\S+)/);
    const icon = iconMatch ? iconMatch[1] : s.key;
    btn.innerHTML = icon + '<span class="jn-count">' + count + '</span>';
    btn.title = s.label;
    btn.addEventListener('click', () => {
      const target = document.getElementById('sec-' + s.key);
      if (target) target.scrollIntoView({behavior:'smooth', block:'start'});
    });
    nav.appendChild(btn);
  });
}

function renderTask(sec, item, idx) {
  const isDone = !!doneState[item.page_id];
  const d = document.createElement('div');
  d.className = 'task' + (isDone ? ' done' : '');

  const check = document.createElement('div');
  check.className = 'task-check';
  check.title = '完了マーク（ローカル）';
  check.addEventListener('click', (e) => {
    e.stopPropagation();
    doneState[item.page_id] = !doneState[item.page_id];
    saveDone();
    render();
  });

  const content = document.createElement('div');
  content.className = 'task-content';
  let html = '<span class="task-name">' + esc(item.title || '(タイトル無し)');
  if (item.priority) {
    const pc = item.priority === '最優先' ? 'p-top' : item.priority === '重要' ? 'p-high' : 'p-info';
    html += ' <span class="priority-tag ' + pc + '">' + esc(item.priority) + '</span>';
  }
  if (sec.meta.indexOf('種別') !== -1 && item.種別) {
    html += ' <span class="priority-tag p-neutral">' + esc(item.種別) + '</span>';
  }
  html += '</span>';

  if (sec.meta.indexOf('memo') !== -1 && item.memo) {
    html += '<span class="memo">' + esc(item.memo) + '</span>';
  }
  const sub = [];
  if (sec.meta.indexOf('投入元') !== -1 && item.投入元) sub.push('投入元: ' + item.投入元);
  if (sec.meta.indexOf('起算日') !== -1 && item.起算日) sub.push('起算日: ' + item.起算日);
  if (sec.meta.indexOf('memo_date') !== -1 && item.memo_date) sub.push('メモ日: ' + item.memo_date);
  if (sec.meta.indexOf('project') !== -1 && item.project) sub.push('project: ' + item.project);
  if (sub.length > 0) html += '<span class="submeta">' + esc(sub.join(' ｜ ')) + '</span>';

  content.innerHTML = html;

  // ダブルクリック → サクセスへ移動（success/keshizumi/buy 以外）
  if (sec.key !== 'success' && sec.key !== 'keshizumi' && sec.key !== 'buy') {
    let clickTimer = null;
    content.addEventListener('click', (e) => {
      e.stopPropagation();
      if (clickTimer) {
        clearTimeout(clickTimer); clickTimer = null;
        d.classList.add('moving');
        setTimeout(() => moveTask(sec.key, idx, 'サクセス'), 260);
      } else {
        clickTimer = setTimeout(() => { clickTimer = null; }, 260);
      }
    });
  }

  const rightMeta = document.createElement('span');
  rightMeta.className = 'task-meta';
  if (sec.meta.indexOf('min') !== -1 && item.min) {
    rightMeta.textContent = item.min + '分';
  }

  const moveBtn = document.createElement('button');
  moveBtn.className = 'move-btn';
  moveBtn.title = '他のカラムへ移動';
  moveBtn.textContent = '⋮';

  const menu = document.createElement('div');
  menu.className = 'move-menu hidden';
  menu.innerHTML = '<div class="move-menu-title">移動先を選択</div>';
  MOVE_TARGETS.forEach(t => {
    const mi = document.createElement('div');
    mi.className = 'move-menu-item' + (t.key === sec.key ? ' current' : '');
    mi.textContent = t.label + (t.key === sec.key ? ' (現在)' : '');
    if (t.key !== sec.key) {
      mi.addEventListener('click', (e) => {
        e.stopPropagation();
        closeAllMenus();
        d.classList.add('moving');
        setTimeout(() => moveTask(sec.key, idx, t.jikanjiku), 260);
      });
    }
    menu.appendChild(mi);
  });

  moveBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const wasHidden = menu.classList.contains('hidden');
    closeAllMenus();
    if (wasHidden) menu.classList.remove('hidden');
  });

  // Phase C: 上段（check + content + rightMeta + ⋮ menu）を .task-row-top で包む
  const topRow = document.createElement('div');
  topRow.className = 'task-row-top';
  topRow.appendChild(check);
  topRow.appendChild(content);
  topRow.appendChild(rightMeta);
  topRow.appendChild(moveBtn);
  d.appendChild(topRow);
  d.appendChild(menu);

  // Phase C: 下段 - 横並び 9 個の丸ボタン（1タップ仕分け）
  if (sec.showQuickButtons) {
    const qb = document.createElement('div');
    qb.className = 'quick-buttons';
    for (const [axis, icon] of QUICK_TARGETS) {
      const btn = document.createElement('button');
      const isCurrent = sec.currentAxis === axis;
      btn.className = 'quick-btn' + (isCurrent ? ' disabled' : '');
      btn.textContent = icon;
      btn.title = axis;
      btn.dataset.target = axis;
      if (!isCurrent) {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          moveToTimeAxis(item.page_id, axis, sec.key, d);
        });
      }
      qb.appendChild(btn);
    }
    d.appendChild(qb);
  }

  return d;
}

// ============================================================================
// boot
// ============================================================================
fetchTasks();
setInterval(fetchTasks, 5 * 60 * 1000);

// Phase C: sweeper 3種トリガー + 起動時 retry
updateSyncIndicator(loadQueue().length);
setInterval(retryQueue, RETRY_INTERVAL_MS);
window.addEventListener('online', retryQueue);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') retryQueue();
});
window.addEventListener('load', () => setTimeout(retryQueue, 1000));
</script>
