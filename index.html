  {key:'h48', label:'\u{1F7E1} 48忙聶聜茅聳聯盲禄楼盲赂聤氓聟聢', cls:'s-yellow', showMin:true, checkable:true, movable:true},
  {key:'w1', label:'\u{1F7E2} 1茅聙卤茅聳聯盲禄楼盲赂聤氓聟聢', cls:'s-green', showMin:true, checkable:false},
  {key:'w2plus', label:'\u{1F535} 2茅聙卤茅聳聯盲禄楼盲赂聤氓聟聢', cls:'s-blue', showMin:true, checkable:false},
  {key:'w1month', label:'芒職陋 1茫聝露忙聹聢盲禄楼盲赂聤氓聟聢', cls:'s-white', showMin:true, checkable:false},
  {key:'success', label:'\u{1F3C6} 茫聜碌茫聜炉茫聜禄茫聜鹿茫聝聲茫聜隆茫聜陇茫聝芦', cls:'s-gold', showCat:true, checkable:true},
  {key:'shopping',label:'\u{1F6D2} 猫虏路茫聛聞莽聣漏茫聝陋茫聜鹿茫聝聢', cls:'s-shop', checkable:true, movable:true},
];
function renderAll() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  let totalTasks = 0, todayMin = 0, todayDone = 0;
  sections.forEach(s => {
    const items = DATA[s.key] || [];
    if (!items.length) return;
    totalTasks += items.length;
    if (s.key === 'today') {
      items.forEach(i => todayMin += (i.min || 0));
      todayDone = items.filter((_, idx) => doneState[s.key + '_' + idx]).length;
    }
    const sec = document.createElement('div');
    sec.className = 'section ' + s.cls;
    const isShop = s.key === 'shopping';
    const doneCount = s.checkable ? items.filter((item, idx) => isShop ? !!shopDone[item.name] : !!doneState[s.key + '_' + idx]).length : 0;
    const doneLabel = s.checkable && doneCount > 0 ? '<span class="done-count">' + doneCount + '/' + items.length + '氓庐聦盲潞聠</span>' : '';
    const successReset = s.key === 'success' && successAdded.length > 0 ? '<span style="font-size:.7em;color:#484f58;cursor:pointer;margin-left:8px" onclick="event.stopPropagation();resetSuccess()">芒聠漏忙聢禄茫聛聶</span>' : '';
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = '<span>' + s.label + doneLabel + successReset + '</span><span class="badge" style="background:#30363d">' + items.length + '</span>';
    const prog = document.createElement('div');
    prog.className = 'progress-bar';
    if (s.checkable && items.length > 0) {
      const pct = Math.round(doneCount / items.length * 100);
      prog.innerHTML = '<div class="progress-fill" style="width:' + pct + '%"></div>';
    }
    const body = document.createElement('div');
    body.className = 'section-body';
    items.forEach((item, idx) => {
      const isDone = s.checkable && (isShop ? !!shopDone[item.name] : !!doneState[s.key + '_' + idx]);
      const d = document.createElement('div');
      d.className = 'task' + (isDone ? ' done' : '');
      let checkHtml = '';
      if (s.checkable) checkHtml = '<div class="task-check"></div>';
      let nameHtml = '<span class="task-name">' + esc(item.name);
      if (s.showPriority && item.priority) {
        const pc = item.priority === '忙聹聙氓聞陋氓聟聢' ? 'p-top' : 'p-high';
        nameHtml += ' <span class="priority-tag ' + pc + '">' + item.priority + '</span>';
      }
      if (item._moved) nameHtml += ' <span class="priority-tag p-success">芒聹聯氓庐聦盲潞聠</span>';
      if (s.showMemo && item.memo) nameHtml += '<span class="memo">' + esc(item.memo) + '</span>';
      if (s.showReason && item.reason) nameHtml += ' <span class="reason">芒聠聮 ' + esc(item.reason) + '</span>';
      if (s.showCat && item.cat) nameHtml += ' <span class="priority-tag p-high">' + esc(item.cat) + '</span>';
      if (s.movable && isDone) nameHtml += '<span class="task-hint">芒聹娄茫聝聙茫聝聳茫聝芦茫聜炉茫聝陋茫聝聝茫聜炉茫聛搂茫聜碌茫聜炉茫聜禄茫聜鹿茫聛赂</span>';
      nameHtml += '</span>';
      let metaHtml = '';
      if (s.showMin && item.min) metaHtml = '<span class="task-meta">' + item.min + '氓聢聠</span>';
      d.innerHTML = checkHtml + '<div class="task-content">' + nameHtml + '</div>' + metaHtml;
      if (s.checkable) {
        let clickTimer = null;
        d.addEventListener('click', (e) => {
          if (clickTimer) {
            clearTimeout(clickTimer); clickTimer = null;
            if (s.movable) { d.classList.add('moving'); setTimeout(() => moveToSuccess(s.key, idx), 280); }
          } else {
            clickTimer = setTimeout(() => {
              clickTimer = null;
              if (isShop) {
                shopDone[item.name] = !shopDone[item.name];
                saveShopDone();
              } else {
                const key = s.key + '_' + idx;
                doneState[key] = !doneState[key];
                saveDone();
              }
              renderAll();
            }, 250);
          }
        });
      }
      body.appendChild(d);
    });
    sec.appendChild(hdr);
    if (s.checkable) sec.appendChild(prog);
    sec.appendChild(body);
    app.appendChild(sec);
    hdr.addEventListener('click', (e) => {
      body.style.display = body.style.display === 'none' ? '' : 'none';
      if (s.checkable) prog.style.display = prog.style.display === 'none' ? '' : 'none';
    });
  });
  document.getElementById('stats').innerHTML =
    '<div class="stat-card"><div class="stat-num">' + totalTasks + '</div><div class="stat-label">氓聟篓茫聜驴茫聜鹿茫聜炉</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + DATA.today.length + '</div><div class="stat-label">盲禄聤忙聴楼茫聜聞茫聜聥茫聛聯茫聛篓</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + todayDone + '/' + DATA.today.length + '</div><div class="stat-label">盲禄聤忙聴楼茫聛庐氓庐聦盲潞聠</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + todayMin + '氓聢聠</div><div class="stat-label">盲禄聤忙聴楼茫聛庐猫娄聥莽漏聧</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + DATA.success.length + '</div><div class="stat-label">\u{1F3C6}茫聜碌茫聜炉茫聜禄茫聜鹿</div></div>';
}
function esc(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
renderAll();
</script>
</body>
</html>
