<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>最強仕事術ダッシュボード</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d1117;color:#c9d1d9;padding:20px;max-width:900px;margin:0 auto}
h1{text-align:center;color:#58a6ff;margin-bottom:8px;font-size:1.6em}
.meta{text-align:center;color:#8b949e;margin-bottom:20px;font-size:.9em}
.section{background:#161b22;border:1px solid #30363d;border-radius:8px;margin-bottom:16px;overflow:hidden}
.section-header{padding:12px 16px;font-weight:bold;font-size:1.1em;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.section-header:hover{opacity:.85}
.section-body{padding:0 16px 12px}
.task{padding:8px 0;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;cursor:pointer}
.task:last-child{border-bottom:none}
.task:hover{background:#1c2128;margin:0 -16px;padding:8px 16px}
.task.done .task-name{text-decoration:line-through;color:#484f58}
.task.done .task-meta{color:#484f58}
.task-check{width:18px;height:18px;border:2px solid #30363d;border-radius:4px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task.done .task-check{background:#238636;border-color:#238636;color:#fff}
.task-check::after{content:'✓';font-size:12px;display:none}
.task.done .task-check::after{display:block}
.task-content{flex:1;min-width:0}
.task-name{display:block;line-height:1.4}
.task-meta{color:#8b949e;font-size:.85em;white-space:nowrap;flex-shrink:0;margin-top:2px}
.priority-tag{font-size:.75em;padding:2px 6px;border-radius:4px;margin-left:6px}
.p-top{background:#da3633;color:#fff}
.p-high{background:#d29922;color:#fff}
.p-success{background:#238636;color:#fff}
.memo{color:#8b949e;font-size:.8em;display:block;margin-top:3px}
.reason{color:#8b949e;font-size:.8em;font-style:italic}
.badge{font-size:.85em;padding:2px 8px;border-radius:12px;color:#fff}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.stat-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 20px;text-align:center}
.stat-num{font-size:1.8em;font-weight:bold;color:#58a6ff}
.stat-label{font-size:.8em;color:#8b949e}
.done-count{font-size:.8em;color:#3fb950;margin-left:8px}
.s-red .section-header{background:#da363322;color:#f85149}
.s-orange .section-header{background:#d2992222;color:#d29922}
.s-yellow .section-header{background:#e3b34122;color:#e3b341}
.s-green .section-header{background:#23883422;color:#3fb950}
.s-blue .section-header{background:#1f6feb22;color:#58a6ff}
.s-white .section-header{background:#8b949e22;color:#8b949e}
.s-gold .section-header{background:#d2992244;color:#d29922}
.s-shop .section-header{background:#a371f722;color:#a371f7}
.s-ash .section-header{background:#21262d;color:#484f58}
.progress-bar{height:3px;background:#21262d;overflow:hidden}
.progress-fill{height:100%;background:#238636;transition:width .3s}
.reset-btn{display:block;text-align:center;margin-top:16px;font-size:.8em;color:#484f58;cursor:pointer;padding:6px}
.reset-btn:hover{color:#8b949e}
.footer{text-align:center;margin-top:16px;font-size:.85em}
.footer a{color:#58a6ff;text-decoration:none}
/* サクセス移動ヒント */
.task.done .task-hint{display:inline;font-size:.75em;color:#3fb950;margin-left:8px;opacity:.7}
.task-hint{display:none}
/* サクセス移動アニメ */
@keyframes moveToSuccess{0%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(60px)}}
.task.moving{animation:moveToSuccess .3s ease-out forwards;pointer-events:none}
/* 操作説明 */
.hint-bar{text-align:center;font-size:.78em;color:#484f58;margin-bottom:12px}
.hint-bar span{margin:0 8px}
</style>
</head>
<body>
<h1>💪 最強仕事術ダッシュボード</h1>
<div class="meta">最終仕分け: <span id="lastDate"></span></div>
<div class="hint-bar"><span>1回クリック → 完了チェック</span>｜<span>ダブルクリック → 🏆 サクセスへ移動</span></div>
<div class="stats" id="stats"></div>
<div id="app"></div>
<div class="reset-btn" onclick="resetAll()">🔄 チェックをすべてリセット</div>
<div class="footer"><a href="https://mits32163216.github.io/saikyou-dashboard/" target="_blank">🔗 GitHub Pages版</a></div>
<script>
const LAST_SHIWAKE = "2026-04-06";
const DATA = {
  today: [
    {name:"2ヶ月コンサルの申し込みフロー＋コンテンツの階層化の整理",min:60,priority:"最優先",memo:"売上直結。申し込みが来ても対応できなければ損失"},
    {name:"コンサル申し込み後のLINE構築",min:60,priority:"最優先",memo:"売上に直結。申し込みが来ても対応できなければ損失"},
    {name:"収支計算する",min:30,priority:"最優先",memo:"3ヶ月500万円を目指すなら今の数字を把握してから動く"},
    {name:"長瀬さん資料作る",min:60,priority:"最優先",memo:"具体的な人名＝締め切りがある"},
    {name:"フロントビデオ作る",min:60,priority:"最優先",memo:"集客→販売の起点。今週動かさないと今月の売上に響く"}
  ],
  tomorrow: [
    {name:"dispatch設定する",min:15},
    {name:"仕事術を毎日仕分けにしてWindowsに組み込み",min:20},
    {name:"レターのマーカー化・赤太字にする",min:20},
    {name:"コンサル用のレター（青いやつ）にする",min:30},
    {name:"ビデオ視聴維持率分析する",min:30,priority:"重要"},
    {name:"お客様の声をLINEで配信＋セールスレターに挿入（1件）",min:20,priority:"重要"},
    {name:"コンサルの様子を抜き出してステップメールに組み込む（1件）",min:30,priority:"重要"},
    {name:"長瀬さんPowerPoint",min:60}
  ],
  h48: [
    {name:"コンテンツの階層化の整理",min:60},
    {name:"2025年確定申告（米国申告期限要確認）",min:60},
    {name:"Messengerのオートレスポンス設定",min:30},
    {name:"2ヶ月110,000円のページのリサーチと修正",min:60},
    {name:"コンサル会員サイトのページにコンテンツを入れる",min:45},
    {name:"講座の売った後フォローメールを作る",min:30}
  ],
  w1: [
    {name:"長期で億かる経営者というコピー",min:30},
    {name:"強い会社を作る4つのステップというコピー",min:30},
    {name:"ビジネスの全体像の設計図（Facebookのメモ）",min:30},
    {name:"コンサルティングモニター（新商品検討）",min:45},
    {name:"Claude Codeエージェント・勉強会録画分解・自動化・プログラム的思考講座作成・販売",min:90},
    {name:"AIコンサルティング内容の整理",min:60},
    {name:"ローション巡回の手順を作る",min:30},
    {name:"Claude Code（通訳ロード）を売りたい→500人×月額9,800円プランを具体化",min:45},
    {name:"コンサル広告用1人型ビデオ",min:60},
    {name:"コンサルZoomを見てサマリー→次回予約フォローメール自動化",min:60}
  ],
  w2plus: [
    {name:"コミュニティサイトの構築",min:120},
    {name:"1人で依存しないために取り替え可能にしておく思想の実装",min:60},
    {name:"ブログ記事を売りたい（Notionの制限ページで納品）",min:45},
    {name:"37歳企業家説（コンテンツアイデア）",min:30},
    {name:"コンテキストエンジニアリングを学ぶ",min:60},
    {name:"サブエージェントについて学ぶ",min:60},
    {name:"AIインターフェース・エージェントの顔を作って嗋らせる",min:60},
    {name:"レビュー動画を撮って公開する",min:45},
    {name:"Mac 200ドル奨学金キャンペーン",min:30},
    {name:"過去メルマガをNotionに取り込んでナレッジ化",min:60}
  ],
  success: [
    {name:"大島さんに連絡する",min:5,cat:"売上"},
    {name:"メルマガネタ毎日貯める（今日分 1件）",min:15,cat:"コンテンツ"}
  ],
  shopping: [
    {name:"ピーラー"},
    {name:"プラスチックセーム"},
    {name:"Amazonプライム更新確認"},
    {name:"百均で籠"},
    {name:"コンセント延長コード"},
    {name:"赤ペン"},
    {name:"綿棒"},
    {name:"プラスチッククリーナー"}
  ],
  ash: [
    {name:"お腹が減った（随時メモ）",reason:"雑詳。ビジネス目標外"},
    {name:"無犯罪証明書取りに行く",reason:"個人手続き。ビジネス目標外"},
    {name:"買い物：ピーラー",reason:"個人的な買い物→shoppingに移動済み"},
    {name:"ダックスハッカーのノータリゼーション",reason:"書類手続き。ビジネス目標外"},
    {name:"スペインデジタルノマドビザ・ポルトガルD7ビザ関連",reason:"個人的な移住計画。Q2目標と無関係"},
    {name:"赤ボイスのようなアプリをスマホ・PC横断で使いたい",reason:"ツール探しは後回し"},
    {name:"YouTubeで仮面動画（散歩動画）を検索",reason:"個人の趣味・娯楽"},
    {name:"Into Itでのアメリカ会計",reason:"海外法人の会計整理。今期の売上には無関係"},
    {name:"英語での出版",reason:"軸と無関係"},
    {name:"会社設立する？",reason:"事業規模拡大後の選択肢。今は不要"},
    {name:"ノートを収益化する",reason:"新チャネル。既存チャネル固めてから"},
    {name:"自分品質アップ・行動管理・YouTube・マネーゲーム化",reason:"ゲーミフィケーション系。500万に直接関係ない"}
  ]
};

const STORAGE_KEY = 'dashboard_done_' + LAST_SHIWAKE;
const SUCCESS_KEY = 'dashboard_success_' + LAST_SHIWAKE;

let doneState = {};
let successAdded = [];

try { doneState = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}
try { successAdded = JSON.parse(localStorage.getItem(SUCCESS_KEY) || '[]'); } catch(e) {}

successAdded.forEach(t => {
  const exists = DATA.success.some(s => s.name === t.name && s._moved);
  if (!exists) DATA.success.push({name: t.name, cat: t.from || '完了', _moved: true});
});

function saveDone() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(doneState)); } catch(e) {}
}
function saveSuccess() {
  try { localStorage.setItem(SUCCESS_KEY, JSON.stringify(successAdded)); } catch(e) {}
}

function moveToSuccess(sKey, idx) {
  const item = DATA[sKey] && DATA[sKey][idx];
  if (!item) return;
  if (DATA.success.some(s => s.name === item.name)) return;
  const entry = {name: item.name, cat: sKey === 'today' ? '今日' : sKey === 'tomorrow' ? '明日' : sKey, _moved: true};
  DATA.success.push(entry);
  successAdded.push({name: item.name, from: entry.cat});
  DATA[sKey].splice(idx, 1);
  const newDone = {};
  Object.keys(doneState).forEach(k => {
    const [kSec, kIdx] = k.split('_');
    const ki = parseInt(kIdx);
    if (kSec === sKey) {
      if (ki < idx) newDone[k] = doneState[k];
      else if (ki > idx) newDone[kSec + '_' + (ki - 1)] = doneState[k];
    } else { newDone[k] = doneState[k]; }
  });
  doneState = newDone;
  saveDone(); saveSuccess(); renderAll();
}

function resetAll() {
  if (!confirm('チェックをすべてリセットしますか？\n（サクセスへ移動したタスクはリセットされません）')) return;
  doneState = {};
  saveDone();
  renderAll()
}

function resetSuccess() {
  if (!confirm('サクセスへ移動したタスクをすべて元に戻しますか？')) return;
  successAdded.forEach(t => {
    const idx = DATA.success.findIndex(s => s.name === t.name && s._moved);
    if (idx !== -1) DATA.success.splice(idx, 1);
  });
  successAdded = [];
  saveSuccess();
  renderAll();
}

document.getElementById('lastDate').textContent = LAST_SHIWAKE;

const sections = [
  {key:'today',   label:'🔴 今日やること',     cls:'s-red',   showMin:true, showPriority:true, showMemo:true, checkable:true, movable:true},
  {key:'tomorrow',label:'🟠 明日でもいいこと', cls:'s-orange', showMin:true, showPriority:true, checkable:true, movable:true},
  {key:'h48',     label:'🟡 48時間以上先',     cls:'s-yellow', showMin:true, checkable:true, movable:true},
  {key:'w1',      label:'🟢 1週間以上先',      cls:'s-green',  showMin:true, checkable:false},
  {key:'w2plus',  label:'🔵 2週間以上先',      cls:'s-blue',   showMin:true, checkable:false},
  {key:'success', label:'🏆 サクセスファイル', cls:'s-gold',   showCat:true, checkable:true},
  {key:'shopping',label:'🛒 買い物リスト',     cls:'s-shop',   checkable:true, movable:true},
  {key:'ash',     label:'🗑️ 消し炭',          cls:'s-ash',   showReason:true, checkable:false},
];

function renderAll() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  let totalTasks = 0, todayMin = 0, todayDone = 0;

  sections.forEach(s => {
    const items = DATA[s.key] || [];
    if (!items.length) return;
    totalTasks += items.length;
    if (s.key === 'today') {
      items.forEach(i => todayMin += (i.min || 0));
      todayDone = items.filter((_, idx) => doneState[s.key + '_' + idx]).length;
    }

    const sec = document.createElement('div');
    sec.className = 'section ' + s.cls;

    const doneCount = s.checkable ? items.filter((_, idx) => doneState[s.key + '_' + idx]).length : 0;
    const doneLabel = s.checkable && doneCount > 0 ? '<span class="done-count">' + doneCount + '/' + items.length + '完了</span>' : '';
    const successReset = s.key === 'success' && successAdded.length > 0
      ? '<span style="font-size:.7em;color:#484f58;cursor:pointer;margin-left:8px" onclick="event.stopPropagation();resetSuccess()">↩戻す</span>' : '';

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = '<span>' + s.label + doneLabel + successReset + '</span><span class="badge" style="background:#30363d">' + items.length + '</span>';

    const prog = document.createElement('div');
    prog.className = 'progress-bar';
    if (s.checkable && items.length > 0) {
      const pct = Math.round(doneCount / items.length * 100);
      prog.innerHTML = '<div class="progress-fill" style="width:' + pct + '%"></div>';
    }

    const body = document.createElement('div');
    body.className = 'section-body';

    items.forEach((item, idx) => {
      const isDone = s.checkable && !!doneState[s.key + '_' + idx];
      const d = document.createElement('div');
      d.className = 'task' + (isDone ? ' done' : '');

      let checkHtml = '';
      if (s.checkable) checkHtml = '<div class="task-check"></div>';

      let nameHtml = '<span class="task-name">' + esc(item.name);
      if (s.showPriority && item.priority) {
        const pc = item.priority === '最優先' ? 'p-top' : 'p-high';
        nameHtml += ' <span class="priority-tag ' + pc + '">' + item.priority + '</span>';
      }
      if (item._moved) nameHtml += ' <span class="priority-tag p-success">✓完了</span>';
      if (s.showMemo && item.memo) nameHtml += '<span class="memo">' + esc(item.memo) + '</span>';
      if (s.showReason && item.reason) nameHtml += ' <span class="reason">→ ' + esc(item.reason) + '</span>';
      if (s.showCat && item.cat) nameHtml += ' <span class="priority-tag p-high">' + esc(item.cat) + '</span>';
      if (s.movable && isDone) nameHtml += '<span class="task-hint">✦ダブルクリックでサクセスへ</span>';
      nameHtml += '</span>';

      let metaHtml = '';
      if (s.showMin && item.min) metaHtml = '<span class="task-meta">' + item.min + '分</span>';

      d.innerHTML = checkHtml + '<div class="task-content">' + nameHtml + '</div>' + metaHtml;

      if (s.checkable) {
        let clickTimer = null;
        d.addEventListener('click', (e) => {
          if (clickTimer) {
            clearTimeout(clickTimer);
            clickTimer = null;
            if (s.movable) {
              d.classList.add('moving');
              setTimeout(() => moveToSuccess(s.key, idx), 280);
            }
          } else {
            clickTimer = setTimeout(() => {
              clickTimer = null;
              const key = s.key + '_' + idx;
              doneState[key] = !doneState[key];
              saveDone();
              renderAll();
            }, 250);
          }
        });
      }
      body.appendChild(d);
    });

    sec.appendChild(hdr);
    if (s.checkable) sec.appendChild(prog);
    sec.appendChild(body);
    app.appendChild(sec);

    hdr.addEventListener('click', (e) => {
      body.style.display = body.style.display === 'none' ? '' : 'none';
      if (s.checkable) prog.style.display = prog.style.display === 'none' ? '' : 'none';
    });
  });

  document.getElementById('stats').innerHTML =
    '<div class="stat-card"><div class="stat-num">' + totalTasks + '</div><div class="stat-label">全タスク</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + DATA.today.length + '</div><div class="stat-label">今日やること</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + todayDone + '/' + DATA.today.length + '</div><div class="stat-label">今日の完了</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + todayMin + '分</div><div class="stat-label">今日の見積</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + DATA.success.length + '</div><div class="stat-label">🏆サクセス</div></div>';
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

renderAll();
</script>
</body>
</html>
